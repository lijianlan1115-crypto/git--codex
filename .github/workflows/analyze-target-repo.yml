name: Analyze target repository impact

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "要分析的真实项目仓库"
        required: true
        default: "TAI-YE-2/hotel--ota-ai"
        type: string
      base_ref:
        description: "对比基准分支"
        required: false
        default: "main"
        type: string
      head_ref:
        description: "目标分支"
        required: false
        default: "main"
        type: string
      requirement:
        description: "需求描述"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # =========================
      # 1️⃣ 拉取当前仓库（报告仓库）
      # =========================
      - name: Checkout report repo
        uses: actions/checkout@v4

      # =========================
      # 2️⃣ 拉取目标仓库（私有）
      # =========================
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_ref }}
          path: target_repo
          fetch-depth: 0
          token: ${{ secrets.TARGET_REPO_TOKEN }}

      # =========================
      # 3️⃣ 生成 diff（稳定版）
      # =========================
      - name: Build diff context
        run: |
          mkdir -p outputs

          cd target_repo

          echo "# CHANGE CONTEXT" > ../outputs/context.md
          echo "Repo: ${{ inputs.target_repo }}" >> ../outputs/context.md
          echo "Base: ${{ inputs.base_ref }}" >> ../outputs/context.md
          echo "Head: ${{ inputs.head_ref }}" >> ../outputs/context.md
          echo "Requirement: ${{ inputs.requirement }}" >> ../outputs/context.md

          git fetch origin

          git diff origin/${{ inputs.base_ref }}..origin/${{ inputs.head_ref }} > ../outputs/diff.patch || true

      # =========================
      # 4️⃣ AI 分析（稳定 Python 版本）
      # =========================
      - name: Run AI impact analysis
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pip install --upgrade openai

          python scripts/analyze.py

      # =========================
      # 5️⃣ 生成最终报告
      # =========================
      - name: Build final report
        run: |
          mkdir -p outputs

          echo "# Codex Impact Report" > outputs/report.md
          echo "" >> outputs/report.md

          cat outputs/context.md >> outputs/report.md
          echo "" >> outputs/report.md
          echo "## AI Analysis" >> outputs/report.md
          cat outputs/ai_result.json >> outputs/report.md

      # =========================
      # 6️⃣ 提交结果
      # =========================
      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add outputs/

          git commit -m "auto: codex impact analysis" || echo "no changes"
          git push || echo "no push needed"
