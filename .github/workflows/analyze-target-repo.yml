name: Analyze target repository impact

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "要分析的真实项目仓库"
        required: true
        default: "TAI-YE-2/hotel--ota-ai"
        type: string
      base_ref:
        description: "对比基准分支或提交"
        required: false
        default: "main"
        type: string
      head_ref:
        description: "要分析的分支或提交"
        required: false
        default: "main"
        type: string
      compare_mode:
        description: "recent_commit=分析最近一次提交；range=分析 base...head"
        required: false
        default: "recent_commit"
        type: choice
        options:
          - recent_commit
          - range
      requirement:
        description: "可选：我准备修改的需求或要关注的问题"
        required: false
        default: ""
        type: string
      focus_paths:
        description: "可选：重点关注路径，逗号分隔"
        required: false
        default: "requirements,runtime,tests,docs,contracts"
        type: string
      ai_provider:
        description: "模型提供方：siliconflow=硅基流动；openai_codex=官方 Codex Action"
        required: false
        default: "siliconflow"
        type: choice
        options:
          - siliconflow
          - openai_codex
      siliconflow_model:
        description: "硅基流动模型名称"
        required: false
        default: "deepseek-ai/DeepSeek-V3"
        type: string

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout report repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Checkout target repository read-only
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_ref }}
          path: target_repo/hotel--ota-ai
          fetch-depth: 0
          token: ${{ secrets.TARGET_REPO_TOKEN || github.token }}

      - name: Build target diff context
        run: |
          mkdir -p outputs
          cd target_repo/hotel--ota-ai

          {
            echo "# Target Repository Change Context"
            echo
            echo "Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "Target repo: ${{ inputs.target_repo }}"
            echo "Base ref: ${{ inputs.base_ref }}"
            echo "Head ref: ${{ inputs.head_ref }}"
            echo "Compare mode: ${{ inputs.compare_mode }}"
            echo "Requirement: ${{ inputs.requirement }}"
            echo "Focus paths: ${{ inputs.focus_paths }}"
            echo
            echo "## Current HEAD"
            git log -1 --pretty=fuller
            echo
            echo "## Recent commits"
            git log -8 --oneline
            echo
            echo "## Repository status"
            git status --short
            echo
            echo "## Repository top-level files"
            find . -maxdepth 2 -type f | sed 's#^\./##' | sort | head -200
          } > ../../outputs/target_change_context.md

          if [ "${{ inputs.compare_mode }}" = "range" ]; then
            git fetch origin "${{ inputs.base_ref }}" --depth=100 || true
            {
              echo "## Changed files"
              git diff --name-only "origin/${{ inputs.base_ref }}...HEAD" || true
              echo
              echo "## Diff stat"
              git diff --stat "origin/${{ inputs.base_ref }}...HEAD" || true
              echo
              echo "## Diff patch"
              git diff --patch "origin/${{ inputs.base_ref }}...HEAD" || true
            } > ../../outputs/target_diff.patch
          else
            {
              echo "## Changed files"
              git show --name-only --format= HEAD
              echo
              echo "## Diff patch"
              git show --format=fuller --stat --patch HEAD
            } > ../../outputs/target_diff.patch
          fi

      - name: Show generated context
        run: |
          echo "==== target_change_context.md ===="
          sed -n '1,220p' outputs/target_change_context.md
          echo "==== target_diff.patch ===="
          sed -n '1,260p' outputs/target_diff.patch

      - name: Run SiliconFlow impact analysis
        if: ${{ inputs.ai_provider == 'siliconflow' }}
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL: ${{ inputs.siliconflow_model }}
          REQUIREMENT: ${{ inputs.requirement }}
          FOCUS_PATHS: ${{ inputs.focus_paths }}
        run: |
          if [ -z "$SILICONFLOW_API_KEY" ]; then
            echo "SILICONFLOW_API_KEY is not configured."
            exit 1
          fi

          python -m pip install --upgrade openai

          python << 'PY'
          import os
          import traceback
          from pathlib import Path
          from openai import OpenAI

          ROOT = Path(".")
          TARGET = ROOT / "target_repo" / "hotel--ota-ai"
          OUTPUTS = ROOT / "outputs"
          OUTPUTS.mkdir(exist_ok=True)

          def read_text(path: Path, limit: int = 12000) -> str:
              if not path.exists():
                  return f"[missing] {path}"
              text = path.read_text(encoding="utf-8", errors="ignore")
              if len(text) > limit:
                  return text[:limit] + f"\n\n[truncated: {len(text) - limit} chars omitted]"
              return text

          def collect_focus_files() -> str:
              focus_paths = [p.strip() for p in os.environ.get("FOCUS_PATHS", "").split(",") if p.strip()]
              if not focus_paths:
                  focus_paths = ["requirements", "runtime", "tests", "docs", "contracts", "config", "skills"]

              allowed_suffixes = {
                  ".py", ".md", ".json", ".yaml", ".yml", ".toml", ".txt", ".sh",
                  ".ini", ".cfg", ".csv", ".sql"
              }
              parts = []
              total_chars = 0
              max_total_chars = 30000

              for rel in focus_paths:
                  base = TARGET / rel
                  if not base.exists():
                      parts.append(f"\n## {rel}\n未发现该路径。")
                      continue

                  files = [base] if base.is_file() else sorted(p for p in base.rglob("*") if p.is_file())
                  selected = [p for p in files if p.suffix.lower() in allowed_suffixes][:12]
                  parts.append(f"\n## {rel}\n收集文件数: {len(selected)}")

                  for path in selected:
                      rel_path = path.relative_to(TARGET)
                      content = read_text(path, limit=2500)
                      block = f"\n### {rel_path}\n```text\n{content}\n```"
                      if total_chars + len(block) > max_total_chars:
                          parts.append("\n[focus context truncated]")
                          return "\n".join(parts)
                      parts.append(block)
                      total_chars += len(block)

              return "\n".join(parts)

          context = read_text(OUTPUTS / "target_change_context.md", limit=16000)
          diff = read_text(OUTPUTS / "target_diff.patch", limit=45000)
          focus_context = collect_focus_files()
          requirement = os.environ.get("REQUIREMENT", "")

          prompt = f"""
          你是“基于 Codex 的研发协同变更分析与测试预警工作流”的分析助手。

          当前运行在 GitHub Actions runner 中。真实项目代码已经 checkout 到本地目录：
          target_repo/hotel--ota-ai

          你不需要修改代码，只需要基于 diff、上下文和重点文件生成研发协同影响分析报告。

          # 用户关注需求
          {requirement}

          # Change Context
          {context}

          # Git Diff
          {diff}

          # Focus Files
          {focus_context}

          请输出 Markdown 报告，必须包含：
          1. 变更摘要：同事或目标分支改了什么
          2. 修改文件清单
          3. 影响模块：代码模块、业务模块、Agent、Skill、配置、输入输出
          4. 协同风险：是否影响其他开发、测试环境、正式环境、其他工作区
          5. 风险等级：low / medium / high，并说明原因
          6. 是否需要我同步修改
          7. 回归验证方案：测试什么、怎么测
          8. 通过标准
          9. 失败标准
          10. 测试清单
          11. 需要人工确认的点

          报告风格用于考核答辩，要清晰、可展示、能体现“GitHub Actions 本地化分析架构”。
          """

          header = """# 研发协同变更分析与测试预警报告

          > 生成方式：GitHub Actions checkout 目标仓库后，使用硅基流动 OpenAI-compatible API 在 runner 本地读取 diff/context 生成。

          """

          client = OpenAI(
              api_key=os.environ["SILICONFLOW_API_KEY"],
              base_url="https://api.siliconflow.cn/v1",
          )

          preferred_model = os.environ.get("SILICONFLOW_MODEL") or "deepseek-ai/DeepSeek-V3"
          fallback_models = [
              preferred_model,
              "Qwen/Qwen2.5-72B-Instruct",
              "Qwen/Qwen2.5-Coder-32B-Instruct",
              "Qwen/Qwen2.5-7B-Instruct",
          ]
          models = []
          for model in fallback_models:
              if model and model not in models:
                  models.append(model)

          errors = []
          report = ""
          used_model = ""

          for model in models:
              try:
                  print(f"Trying SiliconFlow model: {model}")
                  response = client.chat.completions.create(
                      model=model,
                      messages=[
                          {
                              "role": "system",
                              "content": "你是资深研发协同影响分析专家，擅长从代码 diff、项目结构和需求文档中生成测试预警报告。",
                          },
                          {"role": "user", "content": prompt},
                      ],
                      temperature=0.2,
                      max_tokens=3000,
                  )
                  report = response.choices[0].message.content or ""
                  used_model = model
                  break
              except Exception as exc:
                  message = f"{model}: {type(exc).__name__}: {exc}"
                  print(message)
                  errors.append(message)

          if report:
              report = f"模型：{used_model}\n\n" + report.strip()
              (OUTPUTS / "change_summary.md").write_text(header + report + "\n", encoding="utf-8")
              print("Generated outputs/change_summary.md")
          else:
              error_report = header + """
          ## 生成失败

          GitHub Actions 已经成功 checkout 目标仓库并生成 diff/context，但调用硅基流动模型失败。

          ### 已尝试模型

          """ + "\n".join(f"- {model}" for model in models) + """

          ### 错误信息

          ```text
          """ + "\n".join(errors) + "\n\n" + traceback.format_exc() + """
          ```

          ### 下一步

          1. 确认 `SILICONFLOW_API_KEY` 已配置到 `git--codex` 的 Actions Repository secrets。
          2. 确认硅基流动账号有余额/额度。
          3. 在扣子请求体里把 `siliconflow_model` 改成硅基流动控制台中实际可用的模型名称。
          """
              (OUTPUTS / "change_summary.md").write_text(error_report, encoding="utf-8")
              print("Generated diagnostic outputs/change_summary.md")
          PY

      - name: Run Codex impact analysis
        if: ${{ inputs.ai_provider == 'openai_codex' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          output-file: outputs/change_summary.md
          prompt: |
            你是“基于 Codex 的研发协同变更分析与测试预警工作流”的分析助手。

            当前仓库 `git--codex` 是测试工作区和报告仓库。
            真实项目代码已经由 GitHub Actions checkout 到本地目录：

            `target_repo/hotel--ota-ai`

            注意：
            - 不要修改 `target_repo/hotel--ota-ai` 中的任何文件。
            - 不要把目标仓库代码复制到报告仓库。
            - 只读取本地文件并输出影响分析报告。

            请优先阅读：
            - `outputs/target_change_context.md`
            - `outputs/target_diff.patch`
            - `docs/automation/analyze-target-repo-with-codex.md`

            然后结合目标仓库里的代码、需求、契约、测试、Agent、Skill、配置进行分析。
            如果某些目录不存在，请在报告中说明“未发现该目录”，不要报错。

            用户关注需求：
            `${{ inputs.requirement }}`

            重点关注路径：
            `${{ inputs.focus_paths }}`

            请输出 Markdown 报告，必须包含：
            1. 变更摘要：同事或目标分支改了什么
            2. 修改文件清单
            3. 影响模块：代码模块、业务模块、Agent、Skill、配置、输入输出
            4. 协同风险：是否影响其他开发、测试环境、正式环境、其他工作区
            5. 风险等级：low / medium / high，并说明原因
            6. 是否需要我同步修改
            7. 回归验证方案：测试什么、怎么测
            8. 通过标准
            9. 失败标准
            10. 测试清单
            11. 需要人工确认的点

            报告风格用于考核答辩，要清晰、可展示、能体现“GitHub Actions 本地化分析架构”。

      - name: Ensure target repository is not committed
        run: |
          rm -rf target_repo

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/target_change_context.md outputs/target_diff.patch outputs/change_summary.md
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Add target repository impact analysis report"
            git push
          fi
